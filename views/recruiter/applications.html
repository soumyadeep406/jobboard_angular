<div class="container" style="margin-top: 40px">
  <!-- ================= YOUR JOBS ================= -->

  <h2 style="margin-bottom: 20px">Your Jobs</h2>

  <table class="table table-hover table-bordered">
    <thead style="background: #1e293b; color: white">
      <tr>
        <th>Job Title</th>
        <th width="220">Action</th>
      </tr>
    </thead>

    <tbody>
      <tr ng-repeat="j in jobs">


        <td style="font-weight: 600">
          {{j.title}}

          <span
            style="
              background: #e0f2fe;
              color: #0369a1;
              padding: 3px 10px;
              border-radius: 20px;
              font-size: 12px;
              margin-left: 10px;
              font-weight: 600;
            "
          >
            ({{j.applicant_count || 0}} applicants)
          </span>
        </td>


        
        <td>
          <button class="btn-view" ng-click="viewApplications(j.job_id)">
            View Applications
          </button>
        </td>
      </tr>
    </tbody>
  </table>

  <!-- ================= APPLICATIONS ================= -->

  <hr style="margin: 50px 0" />

  <h3 style="margin-bottom: 20px">Applications</h3>

  <!-- Empty State -->
  <div
    ng-if="applications.length == 0"
    style="
      padding: 25px;
      background: #f1f5f9;
      border-radius: 8px;
      color: #64748b;
    "
  >
    No applications found. Select a job to view candidates.
  </div>

  <!-- Applications Table -->
  <table
    ng-if="applications.length > 0"
    class="table table-striped table-hover table-bordered"
  >
    <thead style="background: #0f172a; color: white">
      <tr>
        <th>Candidate</th>
        <th width="160">Status</th>
        <th width="240">Action</th>
      </tr>
    </thead>

    <tbody>
      <tr ng-repeat="a in applications">
        <!-- Candidate -->
        <td>
          <div style="font-weight: 700">{{a.name}}</div>

          <div style="color: gray">{{a.email}}</div>
        </td>

        <!-- STATUS BADGES -->
        <td>
          <!-- Pending -->
          <span ng-if="a.status=='pending'" class="status pending">
            Pending
          </span>

          <!-- Shortlisted -->
          <span ng-if="a.status=='shortlisted'" class="status approved">
            Shortlisted
          </span>

          <!-- Rejected -->
          <span ng-if="a.status=='rejected'" class="status rejected">
            Rejected
          </span>
        </td>

        <!-- ACTION BUTTONS -->
        <td>
          <!-- Approve -->
          <button
            ng-if="a.status=='pending'"
            ng-click="approveApplication(a.app_id)"
            class="btn-approve"
          >
            Shortlist
          </button>

          <!-- Reject -->
          <button
            ng-if="a.status=='pending'"
            ng-click="rejectApplication(a.app_id)"
            class="btn-reject"
          >
            Reject
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<!-- ================= CUSTOM STYLES ================= -->

<style>
  /* VIEW BUTTON */
  .btn-view {
    background: #2563eb;
    color: white;
    border: none;
    padding: 7px 16px;
    border-radius: 6px;
    font-weight: 600;
    transition: 0.2s;
  }

  .btn-view:hover {
    background: #1d4ed8;
    transform: scale(1.05);
  }

  /* APPROVE */
  .btn-approve {
    background: #16a34a;
    color: white;
    border: none;
    padding: 6px 14px;
    border-radius: 6px;
    font-weight: 600;
    margin-right: 6px;
    transition: 0.2s;
  }

  .btn-approve:hover {
    background: #15803d;
    transform: scale(1.05);
  }

  /* REJECT */
  .btn-reject {
    background: #dc2626;
    color: white;
    border: none;
    padding: 6px 14px;
    border-radius: 6px;
    font-weight: 600;
    transition: 0.2s;
  }

  .btn-reject:hover {
    background: #b91c1c;
    transform: scale(1.05);
  }

  /* STATUS BADGES */
  .status {
    padding: 5px 12px;
    border-radius: 20px;
    font-weight: 700;
    font-size: 13px;
  }

  /* Yellow */
  .pending {
    background: #fde68a;
  }

  /* Green */
  .approved {
    background: #bbf7d0;
  }

  /* Red */
  .rejected {
    background: #fecaca;
  }
</style>
