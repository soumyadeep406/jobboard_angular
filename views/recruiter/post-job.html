<h2>Post New Job</h2>

<input ng-model="job.title" placeholder="Job Title"><br><br>
<input ng-model="job.location" placeholder="Location"><br><br>

<textarea ng-model="job.description" placeholder="Job Description"></textarea><br><br>

<input ng-model="job.skills" placeholder="Skills (comma separated)"><br><br>

<button ng-click="postJob()">Post Job</button>
