<h2>Saved Jobs</h2>

<div class="saved-jobs-container">
  
  <div class="job-card" ng-repeat="job in savedJobs">
    
    <h3 class="job-title">{{job.title}}</h3>
    
    <p class="job-location">{{job.location}}</p>

    <div class="job-tags">
      <span class="tag">Saved</span>
    </div>

  </div>

</div>
